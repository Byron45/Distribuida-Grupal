name: books-app

services:
  postgres:
    image: postgres:17.7-alpine3.23
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: books-db
    ports:
      - 5432:5432

  consul:
    image: consul:1.15.4
    container_name: consul
    command: |
      agent -dev
      -ui
      -bind 0.0.0.0
      -client 0.0.0.0
    ports:
      - 8500:8500

  traefik:
    image: traefik:3.2
    container_name: traefik
    command:
      - --api.insecure=true
      - --api.dashboard=true
      - --providers.consulcatalog=true
      - --providers.consulcatalog.endpoint.address=consul:8500
      - --providers.consulcatalog.exposedByDefault=false
      - --entrypoints.web.address=:80
      - --metrics.prometheus=true
    ports:
      - 80:80
      - 8081:8080
    depends_on:
      - consul

  app-authors:
    # image: byronsda45/app-authors:latest
    build:
      context: ../../app-authors
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: app-authors
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/books-db
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
      QUARKUS_HTTP_PORT: 8070
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      QUARKUS_FLYWAY_MIGRATE_AT_START: "true"
    depends_on:
      - postgres
      - consul
    ports:
      - 8070:8070

  app-books:
    # image: byronsda45/app-books:latest
    build:
      context: ../../app-books
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: app-books
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/books-db
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
      QUARKUS_HTTP_PORT: 8080
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      QUARKUS_FLYWAY_MIGRATE_AT_START: "false"
    depends_on:
      - postgres
      - consul
      - app-authors
    ports:
      - 8080:8080

  app-customers:
    # image: byronsda45/app-customers:latest
    build:
      context: ../../app-customers
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: app-customers
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/books-db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SERVER_PORT: 8090
      SPRING_CLOUD_CONSUL_HOST: consul
      SPRING_CLOUD_CONSUL_PORT: 8500
    depends_on:
      - postgres
      - consul
    ports:
      - 8090:8090