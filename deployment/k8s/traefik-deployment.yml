apiVersion: v1
kind: ServiceAccount
metadata:
  name: traefik-account
  namespace: books-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik
  namespace: books-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traefik
  template:
    metadata:
      labels:
        app: traefik
    spec:
      serviceAccountName: traefik-account
      containers:
        - name: traefik
          image: traefik:3.2
          args:
            - "--api.insecure=true"
            - "--api.dashboard=true"
            - "--providers.consulcatalog=true"
            - "--providers.consulcatalog.endpoint.address=consul:8500"
            - "--providers.consulcatalog.exposedByDefault=false"
            - "--entrypoints.web.address=:80"
          ports:
            - name: web
              containerPort: 80
            - name: dashboard
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: traefik
  namespace: books-app
spec:
  type: NodePort
  selector:
    app: traefik
  ports:
    - name: web
      port: 80
      targetPort: 80
    - name: dashboard
      port: 8080
      targetPort: 8080